esphome:
  name: d1mini-fade-d4
  friendly_name: D1 Mini Fade D4
  on_boot:
    priority: -100
    then:
      - script.execute: fade_loop

esp8266:
  board: d1_mini

logger:

api:

ota:
  - platform: esphome

wifi:
  ssid: "YOUR_WIFI_SSID"
  password: "YOUR_WIFI_PASSWORD"

  ap:
    ssid: "D1Mini-Fade-D4 Fallback"
    password: "changeme1234"

output:
  - platform: esp8266_pwm
    pin:
      number: D4
      inverted: true
    frequency: 1000 Hz
    id: led_pwm_d4

script:
  - id: fade_loop
    mode: single
    then:
      - while:
          condition:
            lambda: return true;
          then:
            - lambda: |-
                for (int value = 0; value <= 255; value++) {
                  id(led_pwm_d4).set_level(value / 255.0f);
                  delay(300);
                }
                for (int value = 255; value >= 0; value--) {
                  id(led_pwm_d4).set_level(value / 255.0f);
                  delay(300);
                }
