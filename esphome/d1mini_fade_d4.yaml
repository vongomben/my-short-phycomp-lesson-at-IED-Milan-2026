esphome:
  name: d1mini-fade-d4
  friendly_name: D1 Mini Fade D4

esp8266:
  board: d1_mini

logger:

api:

ota:
  - platform: esphome

wifi:
  ssid: "YOUR_WIFI_SSID"
  password: "YOUR_WIFI_PASSWORD"

  ap:
    ssid: "D1Mini-Fade-D4 Fallback"
    password: "changeme1234"

output:
  - platform: esp8266_pwm
    pin:
      number: D4
      inverted: false
    frequency: 1000 Hz
    id: led_pwm_d4

interval:
  - interval: 30ms
    then:
      - lambda: |-
          static int value = 0;
          static int direction = 1;

          id(led_pwm_d4).set_level(value / 255.0f);

          value += direction;

          if (value >= 255) {
            value = 255;
            direction = -1;
          }

          if (value <= 0) {
            value = 0;
            direction = 1;
          }